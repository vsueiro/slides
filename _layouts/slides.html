<!DOCTYPE html>
<html lang="en" class="wa-{{page.theme}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ page.title }} | {{ site.title }}</title>

    <!-- Web Awesome -->
    <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.5.0/styles/webawesome.css">
    <script type="module" src="https://ka-f.webawesome.com/webawesome@3.5.0/webawesome.loader.js"></script>

    <!-- Custom -->
    <link rel="stylesheet" href="/assets/css/app.css" />
    <script type="module" src="/assets/js/app.js"></script>

    <!-- Make all links to open in new tab -->
    <base target="_blank">
  </head>
  <body>
    <div class="background"></div>
    <header>
      <nav>
        <div class="wa-cluster">
          <wa-button size="small" variant="neutral" appearance="plain" onclick="prevSlide()">
            <wa-icon name="chevron-left" label="Previous Slide"></wa-icon>
          </wa-button>
          <wa-button size="small" variant="neutral" appearance="plain" onclick="nextSlide()">
            <wa-icon name="chevron-right" label="Next Slide"></wa-icon>
          </wa-button>
        </div>
      </nav>
    </header>
    <main hidden>
      {{ page.content | markdownify }}
    </main>
  </body>
</html>
